# agent-design-primer ↔ ai-design-skills cross-link map
# Single source of truth for the loop between the two repos.
#
# Lives at: agent-design-primer/cross-links.yaml
# Skill names below validated against ai-design-skills as of 2026-05-11.
# If a skill name moves in the source repo, update it here first; chapter
# footers should be regenerated from this file.
#
# Pattern:
#   Each chapter has zero-or-one primary_skill (the skill someone naturally
#   runs while reading) and zero-to-two secondary_skills (adjacent skills
#   worth knowing about). related_chapters keeps internal navigation tight.
#   inclusive_links point into inclusive-design-skills.

version: 1
last_updated: 2026-05-11
maintainer: owl-listener
ai_design_skills_repo: https://github.com/Owl-Listener/ai-design-skills

# Six plugins in ai-design-skills, mapped to the six layers of AXD
plugins:
  - id: model-interaction-design
    description: How humans and agents take turns
  - id: ai-alignment-reasoning
    description: Outside-of-the-model alignment work
  - id: system-behavior-shaping
    description: How the agent shows up — persona, tone, error personality
  - id: evaluation
    description: Failure taxonomies, output rubrics, agent-specific heuristics
  - id: design-agent-orchestration
    description: Multi-agent role design, handoffs, observability
  - id: prompt-architecture
    description: Chain-of-thought, constraint specification, system prompts

chapters:

  # ────────────────────────────────────────────────────────────
  # Layer 1 — Foundations
  # ────────────────────────────────────────────────────────────

  - id: L1-foundations
    title: Foundations — what an agent is and the agency spectrum
    path: README.md   # inlined in the README
    primary_skill: null   # pure reading; no runnable companion
    secondary_skills: []
    related_chapters: []
    inclusive_links: []

  # ────────────────────────────────────────────────────────────
  # Layer 2 — Core interaction primitives
  # ────────────────────────────────────────────────────────────

  - id: L2-streaming
    title: Streaming and partial output
    path: chapters/L2-streaming.md
    primary_skill:
      plugin: model-interaction-design
      skill: progressive-disclosure
      summary: Patterns for revealing agent output incrementally with structure and pacing
    secondary_skills:
      - plugin: model-interaction-design
        skill: generative-ui
        summary: Companion for streams that produce interactive surfaces
    related_chapters:
      - L3-progress
    inclusive_links:
      - accessible-streaming-output

  - id: L2-citations
    title: Citations and provenance
    path: chapters/L2-citations.md
    primary_skill:
      plugin: ai-alignment-reasoning
      skill: transparency-patterns
      summary: Surfacing the agent's sources, reasoning, and provenance to the user
    secondary_skills:
      - plugin: evaluation
        skill: output-quality-rubrics
        summary: Rubrics for evaluating whether claims are well-sourced
    related_chapters:
      - L2-confidence
      - L4-hallucination
    inclusive_links:
      - accessible-citation-patterns

  - id: L2-confidence
    title: Confidence and uncertainty
    path: chapters/L2-confidence.md
    primary_skill:
      plugin: ai-alignment-reasoning
      skill: transparency-patterns
      summary: Surfacing model confidence and uncertainty as calibrated signals
    secondary_skills:
      - plugin: evaluation
        skill: output-quality-rubrics
        summary: Calibrating confidence labels to base rates from eval data
    related_chapters:
      - L2-citations
      - L4-trust-calibration
    inclusive_links: []

  - id: L2-refusal
    title: Refusal patterns
    path: chapters/L2-refusal.md
    primary_skill:
      plugin: ai-alignment-reasoning
      skill: guardrail-design
      summary: Designing the rules and copy for what the agent will and will not do
    secondary_skills:
      - plugin: ai-alignment-reasoning
        skill: escalation-design
        summary: Designing the path forward when the agent declines
    related_chapters:
      - L4-high-stakes-gates
    inclusive_links: []

  - id: L2-clarifying
    title: Clarifying questions vs assuming
    path: chapters/L2-clarifying.md
    primary_skill:
      plugin: model-interaction-design
      skill: mixed-initiative-flow
      summary: Deciding when the agent asks vs assumes vs surfaces its assumptions
    secondary_skills:
      - plugin: prompt-architecture
        skill: system-prompt-structure
        summary: Encoding clarification behaviour in the system prompt
    related_chapters: []
    inclusive_links: []

  - id: L2-memory
    title: Memory — session, persistent, scoped
    path: chapters/L2-memory.md
    primary_skill:
      plugin: design-agent-orchestration
      skill: state-management
      summary: Designing tiered memory with user-visible scope and controls
    secondary_skills:
      - plugin: ai-alignment-reasoning
        skill: consent-and-agency
        summary: Memory as a consent and control surface for the user
    related_chapters:
      - L4-pii-handling
    inclusive_links: []

  - id: L2-undo
    title: Undo and reversibility
    path: chapters/L2-undo.md
    primary_skill:
      plugin: ai-alignment-reasoning
      skill: consent-and-agency
      summary: Reversibility as an expression of user agency over agent actions
    secondary_skills:
      - plugin: design-agent-orchestration
        skill: failure-recovery
        summary: Undo as one branch of the broader recovery design
    related_chapters:
      - L4-high-stakes-gates
    inclusive_links: []

  - id: L2-handoff
    title: Handoffs — agent→user, agent→agent
    path: chapters/L2-handoff.md
    primary_skill:
      plugin: design-agent-orchestration
      skill: handoff-protocols
      summary: Designing the payload, trigger, and re-entry points for handoffs
    secondary_skills:
