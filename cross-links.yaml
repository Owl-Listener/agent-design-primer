# ────────────────────────────────────────────────────────────
# Notes on this validation pass
# ────────────────────────────────────────────────────────────
#
# 1. Skill names were validated against the public README and REFERENCES.md
#    of ai-design-skills on 2026-05-11. The references file names ~30 of
#    the 42 skills explicitly; the remaining ~12 skills were not named in
#    public documentation and may exist with different names. When you have
#    the full skill list, do a second pass on this file.
#
# 2. Where a chapter could pair with two or more plausible primary skills,
#    we picked the one most directly named in REFERENCES.md and put the
#    alternative as a secondary. Reasonable people will disagree; treat the
#    primary assignments as the maintainer's call rather than a fact.
#
# 3. The bridge chapter (L4-accessibility) intentionally has no primary
#    skill in ai-design-skills. Its companions live in inclusive-design-skills.
#
# 4. Case studies and the heuristics appendix all primary-link to
#    evaluation / output-quality-rubrics because they are, in effect, rubric
#    applications. Future case studies may justify pairing with more
#    specific evaluation skills if those exist.
